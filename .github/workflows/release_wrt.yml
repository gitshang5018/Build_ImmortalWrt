name: Release WRT
run-name: Release - ${{ inputs.model }}

on:
  workflow_dispatch:
    inputs:
      model:
        required: true
        description: Device Model
        type: choice
        default: jdcloud_ipq60xx_immwrt
        options:
          - aliyun_ap8220_immwrt
          - cmcc_rax3000m_immwrt
          - gemtek_w1701k_immwrt
          - jdcloud_ax6000_immwrt
          - jdcloud_ipq60xx_immwrt
          - jdcloud_ipq60xx_libwrt
          - link_nn6000v2_immwrt
          - linksys_mx4x00_immwrt
          - n1_immwrt
          - qihoo_360v6_immwrt
          - redmi_ax5_immwrt
          - redmi_ax6_immwrt
          - redmi_ax6_libwrt
          - redmi_ax6000_immwrt21
          - zn_m2_immwrt
          - zn_m2_libwrt
          - x64_immwrt

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}

    steps:
      - name: 编译环境准备
        run: |
          echo "::group::正在初始化编译环境"
          # 停止后台自动更新，防止 dpkg 锁冲突
          sudo systemctl disable --now unattended-upgrades || true
          sudo killall -9 unattended-upgr apt apt-get dpkg 2>/dev/null || true
          sleep 3
          sudo dpkg --configure -a || true
          sudo apt-get update || true
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E apt -yqq install dos2unix libfuse-dev
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo -E systemctl daemon-reload
          echo "::endgroup::"

      - name: 检出源码
        uses: actions/checkout@v6.0.2

      - name: 设置编译时间与源码信息
        run: |
          sudo -E timedatectl set-timezone "Asia/Shanghai"
          export BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d_%H.%M.%S")
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
          export BUILD_SRC=$(awk -F"=" '/REPO_URL/ {print $NF}' "./wrt_core/compilecfg/${{ inputs.model }}.ini")
          echo "BUILD_SRC=$BUILD_SRC" >> $GITHUB_ENV

      - name: Pre Clone
        run: ./wrt_core/pre_clone_action.sh ${{ inputs.model }}

      - name: 缓存依赖库
        uses: actions/cache@v5.0.2
        with:
          path: |
            ./action_build/.ccache
            ./action_build/staging_dir
          key: ${{ matrix.os }}-${{ hashFiles('**/repo_flag') }}-${{ env.BUILD_DATE }}
          restore-keys: |
            ${{ matrix.os }}-${{ hashFiles('**/repo_flag') }}-

      - name: 刷新缓存时间戳
        run: |
          echo "::group::正在更新 stamp 依赖文件时间戳"
          if [ -d "./action_build/staging_dir" ]; then
            find "./action_build/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
                find "$dir" -type f -exec touch {} +
            done
          fi
          echo "::endgroup::"

      - name: 硬件与环境信息 (编译前)
        run: |
          echo "::group::编译前环境概览"
          echo "当前时间: $(date '+%F %T %Z')"
          echo "构建机器: ${RUNNER_NAME} (${RUNNER_OS}/${RUNNER_ARCH})"
          echo "内核版本: $(uname -r)"
          echo "运行时间: $(uptime -p)"
          echo "--------------------------------------------------"
          echo "[CPU 信息]"
          lscpu | grep -E "Model name|Architecture|CPU\\(s\\)|Thread\\(s\\) per core|Core\\(s\\) per socket|CPU max MHz"
          echo "--------------------------------------------------"
          echo "[内存状态]"
          free -h
          echo "--------------------------------------------------"
          echo "[磁盘空间]"
          df -hT
          echo "--------------------------------------------------"
          echo "[工作区占用]"
          echo "GITHUB_WORKSPACE=${GITHUB_WORKSPACE}"
          du -sh "${GITHUB_WORKSPACE}" 2>/dev/null || true
          du -sh ./action_build/.ccache 2>/dev/null || true
          du -sh ./action_build/staging_dir 2>/dev/null || true
          du -sh ./firmware 2>/dev/null || true
          echo "::endgroup::"

      - name: 开始编译固件
        run: ./build.sh ${{ inputs.model }}

      - name: 提取内核版本
        run: |
          # 获取内核版本并写入环境变量
          K_VER=$(grep -oP "^kernel.*" ./firmware/*.manifest | grep -oP "[4-6]\.[0-9]{1,3}\.[0-9]{1,3}" | head -n 1)
          echo "KVER=$K_VER" >> $GITHUB_ENV

      - name: 清理过期缓存
        run: |
          echo "::group::正在管理 GitHub Actions 缓存"
          # 获取缓存列表并删除
          gh cache list --key ${{ matrix.os }}-${{ hashFiles('**/repo_flag') }}- --json key --jq '.[] | .key' | while read -r key; do
            gh cache delete "$key" || true
          done
          # 输出缓存状态
          echo "======== 缓存状态 ========"
          echo "ccache 占用: $(du -sh ./action_build/.ccache 2>/dev/null | cut -f 1 || echo "0")"
          echo "staging 占用: $(du -sh ./action_build/staging_dir 2>/dev/null | cut -f 1 || echo "0")"
          echo "::endgroup::"

      - name: 硬件与环境信息 (编译后)
        run: |
          echo "::group::编译后环境详情"
          echo "当前时间: $(date '+%F %T %Z')"
          echo "构建机器: ${RUNNER_NAME} (${RUNNER_OS}/${RUNNER_ARCH})"
          echo "内核版本: $(uname -r)"
          echo "运行时间: $(uptime -p)"
          echo "----------------------------------------------------"
          echo "[CPU 状态]"
          lscpu | grep -E "Model name|Architecture|CPU\\(s\\)|Thread\\(s\\) per core|Core\\(s\\) per socket|CPU max MHz"
          echo "----------------------------------------------------"
          echo "[内存利用率]"
          free -h
          echo "----------------------------------------------------"
          echo "[磁盘空间占用]"
          df -hT
          echo "----------------------------------------------------"
          echo "[编译产物大小]"
          du -sh ./action_build/.ccache 2>/dev/null || true
          du -sh ./action_build/staging_dir 2>/dev/null || true
          du -sh ./firmware 2>/dev/null || true
          echo "固件文件总数: $(ls -1 ./firmware 2>/dev/null | wc -l)"
          echo "::endgroup::"

      - name: 固件打包 (N1)
        if: ${{ inputs.model == 'n1_immwrt' }}
        uses: unifreq/openwrt_packit@master
        env:
          OPENWRT_ARMVIRT: firmware/*.tar.gz
          PACKAGE_SOC: s905d
          KERNEL_VERSION_NAME: 6.6.y

      - name: 生成发布日志
        run: |
          echo "云编译发布" > release_body.txt
          echo "源码：${{ env.BUILD_SRC }}" >> release_body.txt
          echo "内核版本: ${{ env.KVER }}" >> release_body.txt
          echo "WIFI 默认密码: 12345678" >> release_body.txt
          echo "LAN 默认地址: 10.10.10.1" >> release_body.txt
          echo "已包含插件清单：" >> release_body.txt
          echo "$(grep -oP "luci-app(-[a-zA-Z0-9]{1,}){1,}" ./firmware/*.manifest | awk -F":" '{print $NF}' | sort -u)"  >> release_body.txt

      - name: 发布固件至 Release
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ env.BUILD_DATE }}_${{ inputs.model }}
          files: ${{ inputs.model == 'n1_immwrt' && env.PACKAGED_OUTPUTPATH || './firmware' }}/*.*
          body_path: ./release_body.txt
