name: Release WRT
run-name: Release - ${{ inputs.model || github.event.client_payload.model || 'All' }}

on:
  workflow_dispatch:
    inputs:
      model:
        required: true
        description: Device Model
        type: choice
        default: jdcloud_ipq60xx_immwrt
        options:
          - all
          - jdcloud_ipq60xx_immwrt
          - p2w_r619ac-128m_immwrt
          - gehua_ghl-r-001_immwrt
          - dell_wyse_3040_immwrt
          - x64_immwrt
  repository_dispatch:
    types: [build_wrt]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: write
  actions: write
  repository-projects: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      build_date: ${{ steps.set-date.outputs.build_date }}
    steps:
      - name: 设置编译时间
        id: set-date
        run: |
          sudo -E timedatectl set-timezone "Asia/Shanghai"
          echo "build_date=$(TZ=UTC-8 date +"%y.%m.%d_%H.%M.%S")" >> $GITHUB_OUTPUT

      - name: 生成 Matrix 列表
        id: set-matrix
        run: |
          MODELS='["jdcloud_ipq60xx_immwrt", "p2w_r619ac-128m_immwrt", "gehua_ghl-r-001_immwrt", "dell_wyse_3040_immwrt", "x64_immwrt"]'
          SELECTED_MODEL="${{ github.event.inputs.model || github.event.client_payload.model }}"
          
          if [ "$SELECTED_MODEL" = "all" ] || [ -z "$SELECTED_MODEL" ]; then
            echo "matrix={\"model\":$MODELS}" >> $GITHUB_OUTPUT
          else
            echo "matrix={\"model\":[\"$SELECTED_MODEL\"]}" >> $GITHUB_OUTPUT
          fi

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    runs-on: ubuntu-24.04

    steps:
      - name: 编译环境准备
        run: |
          echo "::group::正在初始化编译环境"
          # 停止后台自动更新，防止 dpkg 锁冲突
          sudo systemctl disable --now unattended-upgrades || true
          sudo killall -9 unattended-upgr apt apt-get dpkg 2>/dev/null || true
          sleep 3
          sudo dpkg --configure -a || true
          sudo apt-get update || true
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E apt -yqq install dos2unix libfuse-dev
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo -E systemctl daemon-reload
          echo "::endgroup::"

      - name: 检出源码
        uses: actions/checkout@v6.0.2

      - name: 设置环境变量
        run: |
          echo "BUILD_DATE=${{ needs.prepare.outputs.build_date }}" >> $GITHUB_ENV
          export BUILD_SRC=$(awk -F"=" '/REPO_URL/ {print $NF}' "./wrt_core/compilecfg/${{ matrix.model }}.ini")
          echo "BUILD_SRC=$BUILD_SRC" >> $GITHUB_ENV

      - name: Pre Clone
        run: ./wrt_core/pre_clone_action.sh ${{ matrix.model }}

      - name: 缓存依赖库
        uses: actions/cache@v5.0.2
        with:
          path: |
            ./action_build/.ccache
            ./action_build/staging_dir
          key: ubuntu-24.04-${{ hashFiles('**/repo_flag') }}-${{ env.BUILD_DATE }}
          restore-keys: |
            ubuntu-24.04-${{ hashFiles('**/repo_flag') }}-

      - name: 刷新缓存时间戳
        run: |
          echo "::group::正在更新 stamp 依赖文件时间戳"
          if [ -d "./action_build/staging_dir" ]; then
            find "./action_build/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
                find "$dir" -type f -exec touch {} +
            done
          fi
          echo "::endgroup::"

      - name: 硬件与环境信息 (编译前)
        run: |
          echo "::group::编译前环境概览"
          echo "当前时间: $(date '+%F %T %Z')"
          echo "构建机器: ${RUNNER_NAME} (${RUNNER_OS}/${RUNNER_ARCH})"
          echo "内核版本: $(uname -r)"
          echo "运行时间: $(uptime -p)"
          echo "--------------------------------------------------"
          echo "[CPU 信息]"
          lscpu | grep -E "Model name|Architecture|CPU\\(s\\)|Thread\\(s\\) per core|Core\\(s\\) per socket|CPU max MHz"
          echo "--------------------------------------------------"
          echo "[内存状态]"
          free -h
          echo "--------------------------------------------------"
          echo "[磁盘空间]"
          df -hT
          echo "--------------------------------------------------"
          echo "[工作区占用]"
          echo "GITHUB_WORKSPACE=${GITHUB_WORKSPACE}"
          du -sh "${GITHUB_WORKSPACE}" 2>/dev/null || true
          du -sh ./action_build/.ccache 2>/dev/null || true
          du -sh ./action_build/staging_dir 2>/dev/null || true
          du -sh ./firmware 2>/dev/null || true
          echo "::endgroup::"

      - name: 开始编译固件
        run: ./build.sh ${{ matrix.model }}

      - name: 提取内核版本
        run: |
          # 获取内核版本并写入环境变量
          K_VER=$(grep -oP "^kernel.*" ./firmware/*.manifest | grep -oP "[4-6]\.[0-9]{1,3}\.[0-9]{1,3}" | head -n 1)
          echo "KVER=$K_VER" >> $GITHUB_ENV

      - name: 清理过期缓存
        run: |
          echo "::group::正在管理 GitHub Actions 缓存"
          # 获取缓存列表并删除
          gh cache list --key ubuntu-24.04-${{ hashFiles('**/repo_flag') }}- --json key --jq '.[] | .key' | while read -r key; do
            gh cache delete "$key" || true
          done
          # 输出缓存状态
          echo "======== 缓存状态 ========"
          echo "ccache 占用: $(du -sh ./action_build/.ccache 2>/dev/null | cut -f 1 || echo "0")"
          echo "staging 占用: $(du -sh ./action_build/staging_dir 2>/dev/null | cut -f 1 || echo "0")"
          echo "::endgroup::"

      - name: 硬件与环境信息 (编译后)
        run: |
          echo "::group::编译后环境详情"
          echo "当前时间: $(date '+%F %T %Z')"
          echo "构建机器: ${RUNNER_NAME} (${RUNNER_OS}/${RUNNER_ARCH})"
          echo "内核版本: $(uname -r)"
          echo "运行时间: $(uptime -p)"
          echo "----------------------------------------------------"
          echo "[CPU 状态]"
          lscpu | grep -E "Model name|Architecture|CPU\\(s\\)|Thread\\(s\\) per core|Core\\(s\\) per socket|CPU max MHz"
          echo "----------------------------------------------------"
          echo "[内存利用率]"
          free -h
          echo "----------------------------------------------------"
          echo "[磁盘空间占用]"
          df -hT
          echo "----------------------------------------------------"
          echo "[编译产物大小]"
          du -sh ./action_build/.ccache 2>/dev/null || true
          du -sh ./action_build/staging_dir 2>/dev/null || true
          du -sh ./firmware 2>/dev/null || true
          echo "固件文件总数: $(ls -1 ./firmware 2>/dev/null | wc -l)"
          echo "::endgroup::"

      - name: 固件打包 (N1)
        if: ${{ matrix.model == 'n1_immwrt' }}
        uses: unifreq/openwrt_packit@master
        env:
          OPENWRT_ARMVIRT: firmware/*.tar.gz
          PACKAGE_SOC: s905d
          KERNEL_VERSION_NAME: 6.6.y

      - name: 生成发布日志
        run: |
          echo "云编译发布" > release_body.txt
          echo "型号: ${{ matrix.model }}" >> release_body.txt
          echo "源码：${{ env.BUILD_SRC }}" >> release_body.txt
          echo "内核版本: ${{ env.KVER }}" >> release_body.txt
          echo "WIFI 默认密码: 12345678" >> release_body.txt
          echo "LAN 默认地址: 10.10.10.1" >> release_body.txt
          echo "已包含插件清单：" >> release_body.txt
          echo "$(grep -oP "luci-app(-[a-zA-Z0-9]{1,}){1,}" ./firmware/*.manifest | awk -F":" '{print $NF}' | sort -u)"  >> release_body.txt

      - name: 发布固件至 Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ env.BUILD_DATE }}_${{ matrix.model }}
          files: ${{ matrix.model == 'n1_immwrt' && env.PACKAGED_OUTPUTPATH || './firmware' }}/*.*
          body_path: ./release_body.txt
